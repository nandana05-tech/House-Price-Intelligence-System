events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types        text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ── Upstream targets ────────────────────────────────────────────────────
    upstream hpi_api {
        server api:8080;
    }

    upstream hpi_frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # ── 1. FastAPI — semua route /api/v1/* ────────────────────────────
        location /api/v1/ {
            proxy_pass http://hpi_api;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ── 2. FastAPI health & docs ────────────────────────────────────────────
        location ~ ^/(health|docs|redoc|openapi\.json) {
            proxy_pass         http://hpi_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── 3. Next.js static assets — cache agresif ─────────────────────
        location /_next/static/ {
            proxy_pass         http://hpi_frontend;
            proxy_set_header   Host              $host;
            add_header         Cache-Control     "public, max-age=31536000, immutable";
            access_log         off;
        }

        # ── 4. Next.js public files ────────────────────────────────────────
        location /favicon.ico {
            proxy_pass         http://hpi_frontend;
            access_log         off;
        }

        # ── 5. Semua route lain → Next.js frontend ─────────────────────────
        location / {
            proxy_pass         http://hpi_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
 
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }                                

        # ── 6. Nginx health check ──────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}