# ─────────────────────────────────────────────────────────────────────────────
# House Price Intelligence System — Infrastructure
# ─────────────────────────────────────────────────────────────────────────────
# Services:
#   kafka      — KRaft mode (no Zookeeper), port 9092
#   postgresql — primary datastore,        port 5435 (host) → 5432 (container)
#   redis      — prediction cache,         port 6379
#   mlflow     — experiment tracking UI,   port 5000
#   init       — one-shot bootstrap (ingest data, migrate DB), lalu exit
#   api        — FastAPI REST + ML inference, port 8080
#   mcp_server — FastMCP (StreamableHTTP), port 8000
#   frontend   — Next.js UI,              port 3000
#   nginx      — reverse proxy,           port 80 (public)
#   consumer_* — Kafka ML pods (background)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Kafka (KRaft — no Zookeeper needed) ─────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: hpi_kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafka_data:/var/kraft-combined-logs
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hpi-network

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgresql:
    image: pgvector/pgvector:pg16
    container_name: hpi_postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: hpi
      POSTGRES_PASSWORD: hpi_secret
      POSTGRES_DB: house_price_intel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hpi -d house_price_intel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hpi-network

  # ── Redis (prediction cache) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hpi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hpi-network

  # ── MLflow Tracking Server ───────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: hpi_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    command: >
      sh -c "pip install psycopg2-binary && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel --default-artifact-root /mlflow/artifacts"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - hpi-network

  # ── One-shot DB bootstrap ────────────────────────────────────────────────
  # Jalankan sekali saat pertama deploy (atau saat data perlu di-refresh).
  # Exit 0 setelah selesai — tidak restart.
  # Service lain (api, mcp_server, consumer_*) menunggu init selesai.
  init:
    build: .
    container_name: hpi_init
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      PYTHONPATH: /app
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    command: >
      sh -c "
        echo '[hpi_init] Step 1/7 — Migrate database schema...' &&
        prisma db push --accept-data-loss &&
        echo '[hpi_init] Step 2/7 — Ingest raw data...' &&
        python scripts/ingest_raw_data.py &&
        echo '[hpi_init] Step 3/7 — Clean data (regresi)...' &&
        python scripts/cleaning_pipeline_regression.py &&
        echo '[hpi_init] Step 4/7 — Clean data (klasifikasi)...' &&
        python scripts/cleaning_pipeline_classification.py &&
        echo '[hpi_init] Step 5/7 — Clean data (clustering)...' &&
        python scripts/cleaning_pipeline_clustering.py &&
        echo '[hpi_init] Step 6/7 — Setup encoder...' &&
        python scripts/setup_encoder.py &&
        echo '[hpi_init] Step 7/7 — Ingest RAG knowledge...' &&
        python scripts/ingest_properties.py &&
        python scripts/ingest_knowledge.py &&
        echo '[hpi_init] Bootstrap selesai!'
      "
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hpi-network
    restart: "no"

  # ── HPI API (FastAPI) ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hpi_api
    ports:
      - "8080:8080"   # exposed for direct debugging; nginx handles port 80
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: text-embedding-3-small
      RAG_ENABLED: "true"
      RAG_TOP_K_PROPERTIES: "3"
      RAG_TOP_K_KNOWLEDGE: "2"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - hpi-network

  # ── MCP Server (FastMCP StreamableHTTP) ──────────────────────────────────
  mcp_server:
    build: .
    container_name: hpi_mcp_server
    ports:
      - "8000:8000"   # exposed for direct MCP client access
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      KAFKA_ENABLED: "true"
      MCP_PORT: "8000"
    command: python server.py
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - hpi-network

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hpi_frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://nginx/api/v1
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - hpi-network

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hpi_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - hpi-network

  # ── ML Consumer Pods ──────────────────────────────────────────────────────
  consumer_regression:
    build: .
    container_name: hpi_consumer_regression
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: python -m kafka.consumer_regression
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - hpi-network

  consumer_classification:
    build: .
    container_name: hpi_consumer_classification
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: python -m kafka.consumer_classification
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - hpi-network

  consumer_clustering:
    build: .
    container_name: hpi_consumer_clustering
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: python -m kafka.consumer_clustering
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - hpi-network

  consumer_feedback:
    build: .
    container_name: hpi_consumer_feedback
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      RETRAIN_FEEDBACK_THRESHOLD: "100"
    command: python -m kafka.consumer_feedback
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - hpi-network

volumes:
  kafka_data:
  postgres_data:
  redis_data:
  mlflow_artifacts:

networks:
  hpi-network:
    driver: bridge