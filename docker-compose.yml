# ─────────────────────────────────────────────────────────────────────────────
# House Price Intelligence System — Infrastructure
# ─────────────────────────────────────────────────────────────────────────────
# Services:
#   kafka      — KRaft mode (no Zookeeper), port 9092
#   postgresql — primary datastore,        port 5432
#   redis      — prediction cache,         port 6379
#   mlflow     — experiment tracking UI,   port 5000
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Kafka (KRaft — no Zookeeper needed) ─────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: hpi_kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # KAFKA_LOG_DIRS: /var/kraft-combined-logs
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafka_data:/var/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hpi-network

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgresql:
    image: pgvector/pgvector:pg16
    container_name: hpi_postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: hpi
      POSTGRES_PASSWORD: hpi_secret
      POSTGRES_DB: house_price_intel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hpi -d house_price_intel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hpi-network

  # ── Redis (cache) ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hpi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hpi-network



  # ── MLflow Tracking Server ───────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: hpi_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    command: >
      sh -c "pip install psycopg2-binary && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel --default-artifact-root /mlflow/artifacts"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - hpi-network

  # ── HPI API (FastAPI) ────────────────────────────────────────────────────
  api:
    build: .
    container_name: hpi_api
    # ports:
    #   - "8080:8080"
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: text-embedding-3-small
      RAG_ENABLED: "true"
      RAG_TOP_K_PROPERTIES: "3"
      RAG_TOP_K_KNOWLEDGE: "2"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hpi-network

  # ── MCP Server ───────────────────────────────────────────────────────────
  mcp_server:
    build: .
    container_name: hpi_mcp_server
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command: python server.py
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - hpi-network

  # ── ML Consumer Pods ─────────────────────────────────────────────────────
  consumer_regression:
    build: .
    container_name: hpi_consumer_regression
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: python -m kafka.consumer_regression
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - hpi-network

  consumer_classification:
    build: .
    container_name: hpi_consumer_classification
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: python -m kafka.consumer_classification
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - hpi-network

  consumer_clustering:
    build: .
    container_name: hpi_consumer_clustering
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: python -m kafka.consumer_clustering
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - hpi-network

  consumer_feedback:
    build: .
    container_name: hpi_consumer_feedback
    environment:
      DATABASE_URL: postgresql://hpi:hpi_secret@postgresql:5432/house_price_intel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: python -m kafka.consumer_feedback
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - hpi-network

  nginx:
    image: nginx:alpine
    container_name: hpi_nginx
    ports:
      - "80:80"        # akses API lewat http://localhost
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hpi-network

volumes:
  kafka_data:
  postgres_data:
  redis_data:
  mlflow_artifacts:

networks:
  hpi-network:
    driver: bridge